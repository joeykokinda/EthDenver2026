services:
  contracts:
    image: node:22-alpine
    working_dir: /app/contracts
    volumes:
      - ./contracts:/app/contracts
    command: sh -c "npm install && npx hardhat compile"

  hardhat-node:
    image: node:22-alpine
    working_dir: /app/contracts
    volumes:
      - ./contracts:/app/contracts
    ports:
      - "8545:8545"
    command: sh -c "npm install && npx hardhat node --hostname 0.0.0.0"

  test:
    image: node:22-alpine
    working_dir: /app/contracts
    volumes:
      - ./contracts:/app/contracts
    command: sh -c "npm install && npx hardhat test"
    profiles: [test]

  sim:
    image: node:22-alpine
    working_dir: /app/sim
    volumes:
      - ./sim:/app/sim
    environment:
      - NETWORK=${NETWORK:-local}
      - RPC_URL=${RPC_URL:-http://hardhat-node:8545}
    depends_on:
      - hardhat-node
    command: sh -c "npm install && node index.js"
    profiles: [sim]
